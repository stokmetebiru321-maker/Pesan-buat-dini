<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khusus Buat Sayangku Dini</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body, html { width: 100%; height: 100%; background: #020617; color: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .container { width: 100%; max-width: 450px; height: 100%; background: #020617; position: relative; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .page { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; }
        .page.active { opacity: 1; pointer-events: auto; }
        .btn { background: #bae6fd; color: #0f172a; border: none; padding: 12px 30px; font-weight: bold; border-radius: 25px; cursor: pointer; margin-top: 20px; }
        #canvasPartikel, #canvasHatiTeks { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .nama-tengah { font-size: 50px; font-family: 'Caveat', cursive; color: #fff; text-shadow: 0 0 15px #38bdf8; z-index: 10; }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvasPartikel"></canvas>
        <canvas id="canvasHatiTeks"></canvas>

        <div class="page active" id="page1">
            <h2>Khusus buat Dini</h2>
            <button class="btn" onclick="mulaiSemua()">Buka Kejutan</button>
        </div>

        <div class="page" id="page7">
            <div class="nama-tengah" id="namaTengah" style="opacity: 0; transition: 2s;">Dini</div>
        </div>
    </div>

    <script>
        function pindahHalaman(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        let aktif = false;
        function mulaiSemua() {
            pindahHalaman('page7');
            aktif = true;
            setTimeout(() => document.getElementById('namaTengah').style.opacity = "1", 1000);
        }

        const canvasHatiTeks = document.getElementById('canvasHatiTeks');
        const ctx = canvasHatiTeks.getContext('2d');
        canvasHatiTeks.width = 450; canvasHatiTeks.height = 800;

        let progres = 0;
        function gambarHatiTeks() {
            ctx.clearRect(0, 0, 450, 800);
            if (!aktif) { requestAnimationFrame(gambarHatiTeks); return; }

            ctx.fillStyle = "#38bdf8";
            ctx.font = "12px monospace";
            
            if (progres < 100) progres += 0.5;

            for (let i = 0; i < progres; i++) {
                const t = Math.PI - (i / 100) * Math.PI * 2;
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                
                ctx.fillText("I love you", 225 + x * 10, 400 - y * 10);
            }
            requestAnimationFrame(gambarHatiTeks);
        }
        gambarHatiTeks();
    </script>
</body>
</html>
