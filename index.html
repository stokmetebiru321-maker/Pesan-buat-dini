<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Dini</title>
    <style>
        body { margin: 0; background: #020617; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; text-align: center; position: relative; }
        
        /* Kotak Teks yang Tidak Bakal Bocor */
        .box-cerita { 
            background: rgba(255,255,255,0.1); 
            padding: 20px; 
            border-radius: 15px; 
            width: 100%; 
            word-wrap: break-word; /* Biar teks nggak keluar */
            overflow-wrap: break-word;
            margin-top: 20px;
        }
        
        canvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: -1; }
        .page { display: none; }
        .page.active { display: block; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 20px; border: none; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="canvasHati"></canvas>

    <div class="page active" id="p1">
        <h1>Halo Dini</h1>
        <button onclick="mulai()">Buka Cerita</button>
    </div>

    <div class="page" id="p2">
        <div class="box-cerita">
            Ini adalah cerita panjang tentang rambut kamu yang estetik dan senyum kamu yang bikin aku kalah, sayangg. Teks ini tidak akan keluar lagi.
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvasHati');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 400;

    function mulai() {
        document.getElementById('p1').style.display = 'none';
        document.getElementById('p2').classList.add('active');
        
        // Animasi Hati "I love you"
        let t = 0;
        function draw() {
            ctx.clearRect(0, 0, 400, 400);
            ctx.fillStyle = "#38bdf8";
            ctx.font = "10px Arial";
            for (let i = 0; i < t; i++) {
                let angle = Math.PI - (i / 50) * Math.PI * 2;
                let x = 16 * Math.pow(Math.sin(angle), 3);
                let y = 13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle);
                ctx.fillText("I love you", 200 + x * 10, 200 - y * 10);
            }
            if (t < 50) { t += 0.5; requestAnimationFrame(draw); }
        }
        draw();
    }
</script>
</body>
</html>
