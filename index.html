<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Dini</title>
    <style>
        body { margin: 0; background: #020617; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        .container { width: 90%; max-width: 400px; text-align: center; position: relative; }
        
        /* Kotak Teks Rapi */
        .box-cerita { 
            background: rgba(255,255,255,0.1); 
            padding: 25px; 
            border-radius: 20px; 
            width: 100%; 
            word-wrap: break-word; 
            overflow-wrap: break-word;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            line-height: 1.6;
        }
        
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        button { padding: 12px 25px; cursor: pointer; border-radius: 25px; border: none; background: #38bdf8; color: #020617; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <canvas id="canvasHati"></canvas>

    <div class="page active" id="p1">
        <h1>Halo Dini</h1>
        <button onclick="mulai()">Buka Cerita</button>
    </div>

    <div class="page" id="p2">
        <div class="box-cerita">
            Ini adalah cerita tentang rambut kamu yang estetik dan senyum kamu yang bikin aku kalah, sayangg. Teks ini dijamin aman di dalam kotak dan tidak akan berantakan lagi.
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvasHati');
    const ctx = canvas.getContext('2d');
    canvas.width = 400; canvas.height = 400;
    let t = 0;

    function mulai() {
        document.getElementById('p1').style.display = 'none';
        document.getElementById('p2').classList.add('active');
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, 400, 400);
        ctx.fillStyle = "#38bdf8";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";

        t += 0.8; 

        for (let i = 0; i < t; i++) {
            let angle = Math.PI - (i / 30) * Math.PI * 2;
            let x = 16 * Math.pow(Math.sin(angle), 3);
            let y = 13 * Math.cos(angle) - 5 * Math.cos(2*angle) - 2 * Math.cos(3*angle) - Math.cos(4*angle);
            
            ctx.globalAlpha = Math.min(1, (t - i) / 20); 
            ctx.fillText("I love you", 200 + x * 10, 200 - y * 10);
        }
        
        if (t < 100) requestAnimationFrame(draw);
    }
</script>
</body>
</html>
