<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pertunjukan Spesial</title>
<style>
  /* ============================================================
     CARA KUSTOMISASI CEPAT
     1. Ganti teks di bagian CONFIG di <script> paling bawah file ini
        (nama, judul tiap babak, isi pesan, nama pengirim).
     2. Ganti foto: cari class="polaroid-photo" di HTML, ganti
        style="background-image:url('GANTI_DENGAN_LINK_FOTOMU')"
        dengan URL foto asli (atau base64).
     3. Warna & font bisa diubah di variabel :root di bawah.
     ============================================================ */

  :root{
    --bg-deep:#11203d;
    --bg-velvet:#1c3f6e;
    --gold:#ffd66b;
    --gold-soft:#fff1c4;
    --cream:#f3f8ff;
    --rose:#ff9bb3;
    --ink:#0e0e14;
    --serif:'Cormorant Garamond', 'Playfair Display', Georgia, serif;
    --sans:'Outfit', 'Segoe UI', sans-serif;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg-deep);
    color:var(--cream);
    font-family:var(--sans);
    overflow-x:hidden;
    overflow-y:auto;
    height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  @font-face{
    font-family:'Cormorant Garamond';
    src:local('Cormorant Garamond');
  }

  #app{
    position:relative;
    width:100%;
    min-height:100vh;
  }

  .stage{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:78px 24px 48px;
    text-align:center;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,214,107,0.14), transparent 60%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-velvet) 100%);
  }

  .stage::before{
    content:"";
    position:absolute;
    top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity:.5;
  }

  .motes{
    position:fixed; inset:0; pointer-events:none; z-index:1; overflow:hidden;
  }
  .mote{
    position:absolute;
    width:3px;height:3px;
    background:var(--gold-soft);
    border-radius:50%;
    opacity:.35;
    animation:drift linear infinite;
  }
  @keyframes drift{
    0%{transform:translateY(0) translateX(0); opacity:0;}
    10%{opacity:.5;}
    90%{opacity:.4;}
    100%{transform:translateY(-110vh) translateX(20px); opacity:0;}
  }

  /* ---------- LOADING SCREEN (Baru) ---------- */
  #scene-loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 100;
    background: var(--bg-deep);
    transition: opacity 1s ease, visibility 1s;
  }

  .bouquet-img {
    width: 200px; /* Sesuaikan ukuran bunga */
    max-width: 50vw;
    opacity: 0;
    animation: flyBouquet 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
    margin-bottom: 20px;
  }
  @keyframes flyBouquet {
    0% { transform: translateY(100px) scale(0.5) rotate(-20deg); opacity: 0; }
    100% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  }

  .ily-wrapper {
    position: relative;
    opacity: 0;
    /* Mulai animasi sesudah bunga keluar (delay 1.5s) */
    animation: ilyZoom 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards 1.5s; 
  }
  
  @keyframes ilyZoom {
    0% { transform: scale(0); opacity: 0; }
    50% { transform: scale(1.4); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .ily-text {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 600;
    font-size: clamp(34px, 8vw, 48px);
    color: var(--gold-soft);
    text-shadow: 0 0 22px rgba(255,214,107,.55), 0 0 46px rgba(255,214,107,.25);
    cursor: pointer;
    z-index: 2;
    position: relative;
    transition: transform 0.2s ease;
  }
  
  .ily-text:hover {
    transform: scale(1.05);
  }

  .ily-text .name {
    font-size: clamp(42px, 10vw, 64px);
    display: block;
    margin-top: -5px;
  }

  .loading-heart-bg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -55%);
    width: 250px;
    z-index: 1;
    pointer-events: none;
  }

  .loading-heart-bg svg { width: 100%; display: block; overflow: visible; }

  /* Animasi SVG ditarik dari scene lama */
  .heart-draw{
    fill:none;
    stroke:var(--gold);
    stroke-width:1.5;
    stroke-linecap:round;
    stroke-dasharray:300;
    stroke-dashoffset:300;
    /* Mulai menggambar hati berbarengan saat teks selesai nge-zoom out */
    animation: drawHeart 1.5s cubic-bezier(.65,0,.35,1) forwards 2.2s;
    filter:drop-shadow(0 0 6px rgba(255,214,107,.55));
  }
  .heart-fill-glow{
    fill:var(--rose);
    opacity:0;
    animation: fillPulse 3.4s ease-in-out infinite 3.5s;
    filter:blur(10px);
  }

  @keyframes drawHeart{ to{ stroke-dashoffset:0; } }
  @keyframes fillPulse{
    0%,100%{ opacity:.05; }
    50%{ opacity:.25; }
  }

  .click-hint-loading {
    font-size: 12px;
    color: rgba(243,248,255,.5);
    margin-top: 40px;
    letter-spacing: .05em;
    opacity: 0;
    animation: fadeIn 1s forwards 3.5s;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ---------- CURTAIN (opening screen) ---------- */
  .curtain-panel{
    position:fixed; top:0; bottom:0; width:52%; z-index:20;
    background:
      repeating-linear-gradient(90deg,
        #1c3f6e 0px, #2a5694 18px, #163057 36px, #2a5694 54px);
    box-shadow: inset -30px 0 60px rgba(0,0,0,.5);
    transition: transform 1.1s cubic-bezier(.77,0,.18,1);
  }
  .curtain-left{ left:0; transform-origin:left; }
  .curtain-right{ right:0; transform-origin:right; }
  .curtain-left::after, .curtain-right::after{
    content:""; position:absolute; top:0; bottom:0; width:14px;
    background:linear-gradient(90deg, rgba(0,0,0,.45), transparent);
  }
  .curtain-left::after{ right:0; }
  .curtain-right::after{ left:0; transform:scaleX(-1); }
  .curtains-open .curtain-left{ transform:translateX(-100%) scaleX(.4); }
  .curtains-open .curtain-right{ transform:translateX(100%) scaleX(.4); }

  .marquee{
    font-family:var(--serif);
    font-size:13px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
  }
  .hero-title{
    font-family:var(--serif);
    font-style:italic;
    font-weight:600;
    font-size:clamp(34px,8vw,52px);
    line-height:1.15;
    color:var(--gold-soft);
    margin:0 0 8px;
  }
  .hero-sub{
    font-size:14px;
    color:rgba(243,248,255,.65);
    margin:0 0 36px;
  }

  .ticket-frame{
    position:relative;
    border:1px solid rgba(255,214,107,.45);
    padding:26px 30px;
    border-radius:6px;
    background:rgba(20,16,26,.55);
    backdrop-filter:blur(2px);
  }
  .ticket-frame::before,.ticket-frame::after{
    content:""; position:absolute; width:8px;height:8px;border-radius:50%;
    background:var(--bg-deep); border:1px solid rgba(255,214,107,.45);
    top:50%; transform:translateY(-50%);
  }
  .ticket-frame::before{ left:-5px; }
  .ticket-frame::after{ right:-5px; }

  .btn{
    appearance:none;
    border:none;
    cursor:pointer;
    font-family:var(--sans);
    font-weight:600;
    font-size:14px;
    letter-spacing:.02em;
    color:var(--ink);
    background:linear-gradient(180deg, var(--gold-soft), var(--gold));
    padding:14px 34px;
    border-radius:30px;
    box-shadow:0 6px 18px rgba(255,214,107,.25);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 10px 22px rgba(255,214,107,.35); }
  .btn:active{ transform:translateY(0); }
  .btn:focus-visible{ outline:2px solid var(--cream); outline-offset:3px; }
  
  .hint{
    font-size:11px; color:rgba(243,248,255,.45); margin-top:14px; letter-spacing:.04em;
  }

  /* ---------- ACT SCENES ---------- */
  .act-eyebrow{
    font-family:var(--sans);
    font-size:11px;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:rgba(243,248,255,.5);
    margin-bottom:8px;
  }
  .act-title{
    font-family:var(--serif);
    font-style:italic;
    font-size:clamp(26px,6vw,36px);
    color:var(--gold-soft);
    margin:0 0 28px;
    max-width:520px;
  }

  .polaroid{
    background:#f4ecdc;
    padding:14px 14px 46px;
    border-radius:3px;
    box-shadow:0 18px 40px rgba(0,0,0,.45), 0 2px 0 rgba(255,255,255,.4) inset;
    transform:rotate(-1.2deg);
    width:min(78vw,300px);
    margin-bottom:26px;
  }
  .polaroid-photo{
    width:100%;
    aspect-ratio:4/5;
    border-radius:2px;
    background-size:cover;
    background-position:center;
    background-color:#3a3340;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  
  .letter-card{
    max-width:480px;
    background:rgba(20,16,26,.6);
    border:1px solid rgba(255,214,107,.3);
    border-radius:10px;
    padding:26px 24px;
    font-family:var(--serif);
    font-size:16px;
    line-height:1.7;
    color:var(--cream);
    margin-bottom:28px;
  }
  .letter-card .sign{
    display:block;
    margin-top:16px;
    text-align:right;
    font-style:italic;
    color:var(--gold);
    font-size:15px;
  }

  .dots{ display:flex; gap:6px; margin-top:22px; }
  .dot{
    width:6px;height:6px;border-radius:50%;
    background:rgba(243,248,255,.25);
    transition:background .3s ease, transform .3s ease;
  }
  .dot.active{ background:var(--gold); transform:scale(1.3); }

  .stage[hidden]{ display:none; }

  .scene{ animation:rise .7s ease both; }
  @keyframes rise{
    from{ opacity:0; transform:translateY(18px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- hanging photo string at top ---------- */
  .photo-string{
    position:fixed; top:0; left:0; right:0; height:64px;
    z-index:80;
    display:flex; align-items:flex-start; justify-content:center;
    gap:14px;
    pointer-events:none;
  }
  .photo-string::before{
    content:"";
    position:absolute; top:14px; left:50%;
    width:min(70vw,260px); height:1px;
    transform:translateX(-50%);
    background:linear-gradient(90deg, transparent, rgba(255,214,107,.55), transparent);
  }
  .ps-slot{
    position:relative;
    width:34px;
    opacity:0;
    transform:translateY(-14px) rotate(0deg) scale(.6);
    transition: transform .55s cubic-bezier(.34,1.56,.64,1), opacity .4s ease;
    margin-top:9px;
  }
  .ps-slot.show{ opacity:1; transform:translateY(0) rotate(var(--tilt,-4deg)) scale(1); }
  .ps-slot:nth-child(2){ --tilt:3deg; }
  .ps-slot:nth-child(3){ --tilt:-3deg; }
  .ps-thread{
    position:absolute; top:-9px; left:50%; width:1px; height:9px;
    background:rgba(255,214,107,.5);
    transform:translateX(-50%);
  }
  .ps-photo{
    width:100%; aspect-ratio:4/5;
    background:#0e2240;
    background-size:cover; background-position:center;
    border:2px solid #fbf6e8;
    border-radius:2px;
    box-shadow:0 4px 10px rgba(0,0,0,.4);
  }
</style>
</head>
<body>

<div class="motes" id="motes" aria-hidden="true"></div>

  <div class="ps-slot" id="psSlot2"><div class="ps-thread"></div><div class="ps-photo" id="psPhoto2"></div></div>
  <div class="ps-slot" id="psSlot3"><div class="ps-thread"></div><div class="ps-photo" id="psPhoto3"></div></div>
</div>
